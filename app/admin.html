<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin — VMB Team</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
  <script src="global-nav.js" defer></script>
  <script>
    var firebaseConfig = { apiKey: "AIzaSyA9uPFEC9jTpbxGNkSuGTtaVn5ojU5Ltl8", authDomain: "vmb-team.firebaseapp.com", projectId: "vmb-team", storageBucket: "vmb-team.firebasestorage.app", messagingSenderId: "288248384764", appId: "1:288248384764:web:b406a09f7e49173c5edb79", measurementId: "G-CMRTE1WBBD" };
    if (typeof firebase !== 'undefined') {
      if(!firebase.apps || firebase.apps.length === 0) firebase.initializeApp(firebaseConfig);
      window.firebaseDb = firebase.firestore();
      window.firebaseAuth = firebase.auth ? firebase.auth() : null;
    }
  </script>
  <style>
    :root{
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --line: rgba(15,23,42,0.10);
      --accent: #2563eb;
      --good: #16a34a;
      --danger: #e11d48;
      --shadow: 0 10px 30px rgba(2,6,23,0.10);
      --radius: 14px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      background:
        radial-gradient(1200px 700px at 10% -20%, rgba(37,99,235,0.12), transparent 55%),
        var(--bg);
      color: var(--text);
      font-family: var(--sans);
    }
    .appSwitchBar{
      position: sticky;
      top: 0;
      z-index: 1200;
      display:flex;
      justify-content:center;
      align-items:center;
      padding: 6px 10px;
      background: rgba(248,250,252,0.96);
      border-bottom: 1px solid rgba(15,23,42,0.08);
      backdrop-filter: blur(8px);
    }

    /* Admin top nav — simple: date + ADD MEMBERS */
    .adminNav{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(15,23,42,0.04) 0%, rgba(37,99,235,0.08) 100%);
    }
    .adminNavDate{
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      font-family: var(--mono);
    }
    .adminNavActions{
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .adminNavActions a{ text-decoration: none; }
    .globalTopLinks{
      display:flex;
      align-items:center;
      gap: 8px;
      padding: 2px 0;
    }
    .globalNavBtn{
      height: 30px;
      padding: 0 10px;
      font-size: 11px;
      letter-spacing: 0.05em;
      border-radius: 999px;
      white-space: nowrap;
    }
    .globalNavBtn.isActive{
      background: rgba(37,99,235,0.16);
      border-color: rgba(37,99,235,0.28);
      color: #1d4ed8;
    }

    .btn{
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 38px;
      padding: 0 14px;
      border-radius: 12px;
      font-weight: 700;
      border: 1px solid rgba(15,23,42,0.12);
      background: #fff;
      cursor: pointer;
      text-decoration: none;
      font: inherit;
      color: var(--text);
    }
    .btn.secondary{ background: rgba(15,23,42,0.04); }
    .btn.good{ background: rgba(34,197,94,0.14); border-color: rgba(34,197,94,0.28); }
    .btn.danger{ background: rgba(244,63,94,0.12); border-color: rgba(244,63,94,0.22); }

    .wrap{
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 14px;
    }

    /* Team Members Page — section below nav */
    .teamMembersPage{
      margin-top: 0;
    }
    .teamMembersPage h2{
      margin: 0 0 16px 0;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    /* Stats placeholder */
    .adminStats{
      min-height: 400px;
      width: 100%;
      background: rgba(15,23,42,0.02);
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      margin-bottom: 24px;
    }

    .panel{
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 20px;
    }
    .panelHeader{
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .panelHeader h2{
      margin: 0;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: var(--mono);
    }
    .panelBody{ padding: 18px; }

    input{
      font: inherit;
      color: var(--text);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      outline: none;
      width: 100%;
    }
    input:focus{
      border-color: rgba(37,99,235,0.55);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }

    .pill{
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(15,23,42,0.03);
      color: var(--muted);
    }

    .memberList{ display: flex; flex-direction: column; gap: 10px; }
    .memberRow{
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(15,23,42,0.02);
    }
    .memberRowTitle{ font-weight: 800; font-size: 15px; }
    .memberRowMeta{ font-size: 12px; color: var(--muted); margin-top: 2px; }
    .memberRowAdded{ font-size: 11px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }
    .memberRowActions{ display: flex; gap: 8px; align-items: center; }
    .memberRowActions a{ text-decoration: none; }

    /* Project dropdown icon + list */
    .memberProjWrap{
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .projDropBtn{
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(15,23,42,0.04);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--muted);
      transition: background 0.15s;
    }
    .projDropBtn:hover{ background: rgba(15,23,42,0.08); }
    .projDropBtn.open{ background: rgba(37,99,235,0.12); color: var(--accent); }
    .projDropList{
      display: none;
      position: absolute;
      right: 0;
      top: 100%;
      margin-top: 4px;
      min-width: 180px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: var(--shadow);
      padding: 8px 0;
      z-index: 10;
      list-style: none;
      margin: 4px 0 0 0;
    }
    .projDropList.show{ display: block; }
    .projDropList li{
      padding: 8px 12px;
      font-size: 13px;
      color: var(--text);
    }
    .projDropList li.empty{ color: var(--muted); font-style: italic; }
    .projDropWrap{ position: relative; }

    /* Add Member modal */
    .modalOverlay{
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }
    .modalOverlay.show{ display: flex; }
    .modalCard{
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: 0 24px 60px rgba(2,6,23,0.25);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
    }
    .modalHead{
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modalTitle{ font-size: 18px; font-weight: 800; margin: 0; }
    .modalBody{ padding: 18px; }
    .modalBody .field{ margin-bottom: 14px; }
    .modalBody .field label{
      display: block;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }
    .modalFoot{
      padding: 14px 18px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .iconBtn{ font-size: 20px; line-height: 1; padding: 0 10px; }
    textarea{
      font: inherit;
      color: var(--text);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      outline: none;
      width: 100%;
      min-height: 96px;
      resize: vertical;
    }
    textarea:focus{
      border-color: rgba(37,99,235,0.55);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }
    .revQuickBtns{ display:flex; gap:8px; margin:8px 0 0 0; }
  </style>
</head>
<body>

  <div class="appSwitchBar">
    <div class="globalTopLinks" data-global-nav-slot></div>
  </div>

  <!-- Admin top nav: today's date + ADD MEMBERS -->
  <nav class="adminNav">
    <span class="adminNavDate" id="adminNavDate">—</span>
    <div class="adminNavActions">
      <a href="index.html" class="btn secondary">← Back to Planner</a>
      <button type="button" class="btn" id="signInBtn">SIGN IN</button>
      <button type="button" class="btn" id="signOutBtn">SIGN OUT</button>
      <button type="button" class="btn secondary" id="revBtn">REV <span id="revPill">1.0</span></button>
      <button type="button" class="btn secondary" id="backupNowBtn">BACKUP NOW</button>
      <button type="button" class="btn secondary" id="importBackupBtn">IMPORT BACKUP</button>
      <input type="file" id="importBackupFile" accept=".json,application/json" style="display:none;" />
      <button type="button" class="btn good" id="addMembersBtn">ADD MEMBERS</button>
    </div>
  </nav>

  <!-- Team Members Page (below nav) -->
  <div class="wrap">
    <section class="teamMembersPage">
      <h2>Team Members</h2>

      <div class="adminStats" id="adminStats"></div>

      <div class="panel">
        <div class="panelHeader">
          <h2>Members</h2>
          <span class="pill" id="memberCount">0 members</span>
        </div>
        <div class="panelBody">
          <div class="memberList" id="memberListDiv"></div>
        </div>
      </div>
    </section>
  </div>

  <!-- Add Member modal -->
  <div class="modalOverlay" id="addMemberOverlay" aria-hidden="true">
    <div class="modalCard">
      <div class="modalHead">
        <span class="modalTitle">Add Member</span>
        <button type="button" class="btn secondary iconBtn" id="addMemberClose" title="Close">&times;</button>
      </div>
      <div class="modalBody">
        <div class="field">
          <label>Name</label>
          <input id="memberName" placeholder="e.g. JSW" />
        </div>
        <div class="field">
          <label>Phone</label>
          <input id="memberPhone" placeholder="512-555-1212" />
        </div>
        <div class="field">
          <label>Email</label>
          <input id="memberEmail" type="email" placeholder="user@example.com" />
        </div>
        <div class="field">
          <label>Role</label>
          <input id="memberRole" placeholder="member" value="member" />
        </div>
      </div>
      <div class="modalFoot">
        <button type="button" class="btn good" id="memberSaveBtn">SAVE</button>

  <!-- Revision modal -->
  <div class="modalOverlay" id="revOverlay" aria-hidden="true">
    <div class="modalCard">
      <div class="modalHead">
        <span class="modalTitle">Revision</span>
        <button type="button" class="btn secondary iconBtn" id="revCloseBtn" title="Close">&times;</button>
      </div>
      <div class="modalBody">
        <div class="field">
          <label>Current Revision</label>
          <input id="revInput" value="1.0" />
          <div class="revQuickBtns">
            <button type="button" class="btn secondary" id="revPlusPointOne">+0.1</button>
            <button type="button" class="btn secondary" id="revPlusOne">+1.0</button>
          </div>
        </div>
        <div class="field">
          <label>Revision Notes</label>
          <textarea id="revNotes" placeholder="What changed in this revision?"></textarea>
        </div>
      </div>
      <div class="modalFoot">
        <button type="button" class="btn secondary" id="revCancelBtn">CANCEL</button>
        <button type="button" class="btn good" id="revSaveBtn">SAVE REV</button>
      </div>
    </div>
  </div>

<script>
(function(){
  const $ = (id) => document.getElementById(id);
  const db = window.firebaseDb;
  const auth = (typeof firebase !== "undefined" && firebase.auth) ? firebase.auth() : null;
  const TEAM_ID = "vmb-team";
  const MEMBER_INIT_KEY = "daily_planner.member_init.v1";
  const REV_META_KEY = "vmb.revision.meta";
  let MEMBERS = [];
  let MEMBER_PROJECTS = {}; // memberId -> [ project names ] (placeholder; could be from Firestore later)
  function membersCollection(){
    try {
      if(!db || !db.collection) return null;
      return db.collection("teamMembers");
    } catch(e){
      console.error("[ADMIN] membersCollection failed", e);
      return null;
    }
  }
  function loadRevisionMeta(){
    try {
      const v = JSON.parse(localStorage.getItem(REV_META_KEY) || "{}");
      return {
        currentRev: typeof v.currentRev === "string" && v.currentRev.trim() ? v.currentRev : "1.0",
        notes: typeof v.notes === "string" ? v.notes : "",
        lastBackupAt: v.lastBackupAt || null
      };
    } catch {
      return { currentRev: "1.0", notes: "", lastBackupAt: null };
    }
  }
  function saveRevisionMeta(meta){
    try { localStorage.setItem(REV_META_KEY, JSON.stringify(meta)); } catch(e){ console.warn(e); }
  }
  function setRevPill(){
    const meta = loadRevisionMeta();
    const el = $("revPill");
    if(el) el.textContent = meta.currentRev;
  }
  function revToTenths(rev){
    const n = Number.parseFloat(String(rev || "1.0"));
    return Number.isFinite(n) ? Math.round(n * 10) : 10;
  }
  function tenthsToRev(n){
    return (Math.max(0, Number(n) || 0) / 10).toFixed(1);
  }
  function bumpRevision(deltaTenths){
    const inp = $("revInput");
    if(!inp) return;
    const next = revToTenths(inp.value) + deltaTenths;
    inp.value = tenthsToRev(next);
  }
  function openRevModal(){
    const overlay = $("revOverlay");
    const meta = loadRevisionMeta();
    const revInput = $("revInput");
    const notes = $("revNotes");
    if(revInput) revInput.value = meta.currentRev;
    if(notes) notes.value = meta.notes || "";
    if(overlay){ overlay.classList.add("show"); overlay.setAttribute("aria-hidden", "false"); }
  }
  function closeRevModal(){
    const overlay = $("revOverlay");
    if(overlay){ overlay.classList.remove("show"); overlay.setAttribute("aria-hidden", "true"); }
  }
  function saveRevFromModal(){
    const revInput = $("revInput");
    const notes = $("revNotes");
    const rev = tenthsToRev(revToTenths(revInput ? revInput.value : "1.0"));
    const existing = loadRevisionMeta();
    saveRevisionMeta({ ...existing, currentRev: rev, notes: notes ? notes.value : existing.notes });
    setRevPill();
    closeRevModal();
  }
  function clearMemberWorkspace(memberId){
    try {
      const id = String(memberId || "").trim().toLowerCase();
      if(!id || id === "jsw" || id === "admin") return;
      localStorage.removeItem("daily_planner.v1." + id);
      const map = JSON.parse(localStorage.getItem(MEMBER_INIT_KEY) || "{}");
      delete map[id];
      localStorage.setItem(MEMBER_INIT_KEY, JSON.stringify(map));
    } catch(e){ console.warn("clearMemberWorkspace failed", e); }
  }

  function serverTimestamp(){
    try {
      if (typeof firebase !== "undefined" && firebase.firestore && firebase.firestore.FieldValue && firebase.firestore.FieldValue.serverTimestamp)
        return firebase.firestore.FieldValue.serverTimestamp();
    } catch (e) { console.warn("serverTimestamp fallback", e); }
    return null;
  }
  function nowStamp(){ return Date.now(); }

  function todayStr(){
    const d = new Date();
    return d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric", year: "numeric" });
  }
  function setNavDate(){
    const el = $("adminNavDate");
    if(el) el.textContent = todayStr();
  }
  function safeParse(value){
    try { return JSON.parse(value); } catch { return value; }
  }
  function stamp(){
    const d = new Date();
    const pad = (n) => String(n).padStart(2, "0");
    return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()) + "_" + pad(d.getHours()) + "-" + pad(d.getMinutes());
  }
  function collectLocalStorageSnapshot(){
    const out = {};
    for(let i = 0; i < localStorage.length; i++){
      const k = localStorage.key(i);
      if(!k) continue;
      if(k.startsWith("daily_planner.") || k === "vmb_team" || k === "planner.ui.v1" || k === "planner.forceMember"){
        out[k] = safeParse(localStorage.getItem(k));
      }
    }
    return out;
  }
  async function exportBackupNow(){
    const btn = $("backupNowBtn");
    if(btn){ btn.disabled = true; btn.textContent = "BACKING UP..."; }
    try {
      const revMeta = loadRevisionMeta();
      const payload = {
        version: "0.8rev",
        revision: revMeta.currentRev,
        revisionNotes: revMeta.notes || "",
        capturedAt: new Date().toISOString(),
        origin: location.origin,
        path: location.pathname,
        localStorage: collectLocalStorageSnapshot(),
        firestore: {}
      };
      if(db){
        try {
          const membersRef = membersCollection();
          const snap = membersRef ? await membersRef.orderBy("name", "asc").get() : null;
          payload.firestore.teamMembers = snap ? snap.docs.map(d => ({ id: d.id, ...d.data() })) : [];
        } catch(e){
          payload.firestore.teamMembersError = String(e && e.message ? e.message : e);
        }
      }
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "vmb-data-backup-r" + String(revMeta.currentRev).replace(/\./g, "_") + "-" + stamp() + ".json";
      a.click();
      URL.revokeObjectURL(a.href);
      saveRevisionMeta({ ...revMeta, lastBackupAt: new Date().toISOString() });
    } finally {
      if(btn){ btn.disabled = false; btn.textContent = "BACKUP NOW"; }
    }
  }
  function applyLocalStorageSnapshot(snapshot){
    if(!snapshot || typeof snapshot !== "object") throw new Error("Backup missing localStorage snapshot.");
    const allowed = (k) => {
      return k === "vmb_team"
        || k === "planner.ui.v1"
        || k === "planner.forceMember"
        || k.startsWith("daily_planner.");
    };
    let applied = 0;
    for(const [k, v] of Object.entries(snapshot)){
      if(!allowed(k)) continue;
      if(typeof v === "string"){
        localStorage.setItem(k, v);
      } else {
        localStorage.setItem(k, JSON.stringify(v));
      }
      applied++;
    }
    return applied;
  }
  function importBackupFromFile(file){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onerror = () => reject(new Error("Could not read backup file."));
      reader.onload = () => {
        try {
          const payload = JSON.parse(String(reader.result || "{}"));
          const snapshot = payload && payload.localStorage ? payload.localStorage : null;
          const applied = applyLocalStorageSnapshot(snapshot);
          resolve({ applied, capturedAt: payload?.capturedAt || null });
        } catch(e){
          reject(e);
        }
      };
      reader.readAsText(file);
    });
  }

  function slug(name){
    return (name || "").trim().toLowerCase().replace(/\s+/g, "-").replace(/[^a-z0-9-]/g, "") || "member";
  }
  function docIdFor(m){
    return m.id || slug(m.name) || ("m_" + Date.now());
  }
  function formatAddDate(m){
    const raw = m.createdAt;
    if(!raw) return "—";
    const date = raw && typeof raw.toDate === "function" ? raw.toDate() : new Date(typeof raw === "number" ? raw : raw);
    return isNaN(date.getTime()) ? "—" : date.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  }

  function openAddModal(){
    const overlay = $("addMemberOverlay");
    if(overlay){ overlay.classList.add("show"); overlay.setAttribute("aria-hidden", "false"); }
    $("memberName").value = "";
    $("memberPhone").value = "";
    $("memberEmail").value = "";
    $("memberRole").value = "member";
    setTimeout(() => $("memberName").focus(), 50);
  }
  function closeAddModal(){
    const overlay = $("addMemberOverlay");
    if(overlay){ overlay.classList.remove("show"); overlay.setAttribute("aria-hidden", "true"); }
  }

  async function saveMember(){
    const name = ($("memberName").value || "").trim();
    const phone = ($("memberPhone").value || "").trim();
    const email = ($("memberEmail").value || "").trim();
    const role = ($("memberRole").value || "member").trim();
    if(!name){ alert("Name required"); return; }
    if(!db){ alert("Firebase not loaded. Check console (F12)."); return; }

    const docId = slug(name);
    if(!docId){ alert("Invalid name"); return; }
    const ts = serverTimestamp();
    const createdAt = ts !== null ? ts : nowStamp();
    const updatedAt = ts !== null ? ts : nowStamp();

    try {
      const membersRef = membersCollection();
      if(!membersRef){ throw new Error("members collection unavailable"); }
      await membersRef.doc(docId).set({
        id: docId,
        name,
        phone: phone || null,
        email: email || null,
        role: role || "member",
        active: true,
        createdAt: createdAt,
        updatedAt: updatedAt
      }, { merge: true });
      // "Add Member" always provisions a blank workspace for non-JSW members.
      clearMemberWorkspace(docId);
      closeAddModal();
      // list updates via onSnapshot
    } catch (err) {
      console.error("Admin saveMember error:", err);
      alert("Save failed: " + (err && err.message ? err.message : String(err)));
    }
  }

  function renderMembers(){
    const list = $("memberListDiv");
    const count = $("memberCount");
    if(!list) return;

    if(MEMBERS.length === 0){
      list.innerHTML = '<div class="memberRow" style="opacity:0.7;"><div class="memberRowTitle">No members yet</div><div class="memberRowMeta">Click ADD MEMBERS above to add someone.</div></div>';
      if(count) count.textContent = "0 members";
      return;
    }

    list.innerHTML = "";
    for(const m of MEMBERS){
      const id = docIdFor(m);
      const workspaceMemberId = slug(m.name || id);
      const workspaceHref = workspaceMemberId === "jsw" ? "/index.html" : ("/index.html?member=" + encodeURIComponent(workspaceMemberId));
      const meta = [m.phone || "", m.email || ""].filter(Boolean).join(" • ");
      const addDate = formatAddDate(m);
      const projNames = MEMBER_PROJECTS[id] && MEMBER_PROJECTS[id].length ? MEMBER_PROJECTS[id] : [];

      const row = document.createElement("div");
      row.className = "memberRow";
      row.innerHTML = `
        <div>
          <div class="memberRowTitle">${(m.name || "(no name)")}</div>
          <div class="memberRowMeta">${meta || "—"} ${m.role ? "• " + m.role : ""}</div>
          <div class="memberRowAdded">Added: ${addDate}</div>
        </div>
        <div class="memberProjWrap">
          <div class="projDropWrap">
            <button type="button" class="projDropBtn" title="Projects" aria-label="Projects">▾</button>
            <ul class="projDropList" data-member-id="${id}">
              ${projNames.length ? projNames.map(n => `<li>${n}</li>`).join("") : '<li class="empty">No projects</li>'}
            </ul>
          </div>
        </div>
        <div class="memberRowActions">
          <a href="${workspaceHref}" class="btn good workspaceBtn" data-workspace-id="${workspaceMemberId}">WORKSPACE</a>
          <button type="button" class="btn danger btnRemove" data-id="${id}" data-workspace-id="${workspaceMemberId}" ${(workspaceMemberId === "admin" || workspaceMemberId === "jsw") ? "disabled" : ""}>Remove</button>
        </div>
      `;
      list.appendChild(row);

      const dropBtn = row.querySelector(".projDropBtn");
      const dropList = row.querySelector(".projDropList");
      if(dropBtn && dropList){
        dropBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          document.querySelectorAll(".projDropList.show").forEach(el => { if(el !== dropList) el.classList.remove("show"); });
          document.querySelectorAll(".projDropBtn.open").forEach(el => { if(el !== dropBtn) el.classList.remove("open"); });
          dropList.classList.toggle("show");
          dropBtn.classList.toggle("open");
        });
      }
    }

    list.querySelectorAll(".btnRemove").forEach(btn => {
      btn.addEventListener("click", async () => {
        const id = btn.getAttribute("data-id");
        const workspaceId = btn.getAttribute("data-workspace-id");
        if(!confirm("Remove this member?")) return;
        try {
          const membersRef = membersCollection();
          if(!membersRef){ throw new Error("members collection unavailable"); }
          await membersRef.doc(id).delete();
          clearMemberWorkspace(id);
          clearMemberWorkspace(workspaceId);
        } catch(e){ console.error(e); }
      });
    });

    list.querySelectorAll(".workspaceBtn").forEach(btn => {
      btn.addEventListener("click", () => {
        const wid = String(btn.getAttribute("data-workspace-id") || "").trim().toLowerCase();
        try {
          if(!wid || wid === "jsw") localStorage.removeItem("planner.forceMember");
          else localStorage.setItem("planner.forceMember", wid);
        } catch(e){ console.warn("workspaceBtn handoff failed", e); }
      });
    });

    if(count) count.textContent = MEMBERS.length + " member" + (MEMBERS.length === 1 ? "" : "s");
  }

  $("addMembersBtn").addEventListener("click", openAddModal);
  $("revBtn").addEventListener("click", openRevModal);
  $("backupNowBtn").addEventListener("click", exportBackupNow);
  $("importBackupBtn").addEventListener("click", () => {
    const picker = $("importBackupFile");
    if(!picker) return;
    picker.value = "";
    picker.click();
  });
  $("importBackupFile").addEventListener("change", async (e) => {
    const input = e.target;
    const file = input && input.files && input.files[0] ? input.files[0] : null;
    if(!file) return;
    const btn = $("importBackupBtn");
    if(btn){ btn.disabled = true; btn.textContent = "IMPORTING..."; }
    try {
      const result = await importBackupFromFile(file);
      alert("Imported backup snapshot (" + result.applied + " keys). Reloading...");
      location.href = "/index.html";
    } catch(err){
      console.error("Import backup failed:", err);
      alert("Import failed: " + (err && err.message ? err.message : String(err)));
    } finally {
      if(btn){ btn.disabled = false; btn.textContent = "IMPORT BACKUP"; }
      if(input) input.value = "";
    }
  });
  $("revCloseBtn").addEventListener("click", closeRevModal);
  $("revCancelBtn").addEventListener("click", closeRevModal);
  $("revSaveBtn").addEventListener("click", saveRevFromModal);
  $("revPlusPointOne").addEventListener("click", () => bumpRevision(1));
  $("revPlusOne").addEventListener("click", () => bumpRevision(10));
  $("revOverlay").addEventListener("click", (e) => { if(e.target === e.currentTarget) closeRevModal(); });
  $("addMemberClose").addEventListener("click", closeAddModal);
  $("addMemberOverlay").addEventListener("click", (e) => { if(e.target === e.currentTarget) closeAddModal(); });
  $("memberSaveBtn").addEventListener("click", () => saveMember());
  $("memberName").addEventListener("keydown", (e) => { if(e.key === "Enter"){ e.preventDefault(); saveMember(); } });
  $("signInBtn").addEventListener("click", async () => {
    const email = prompt("Email:");
    const pass = prompt("Password:");
    if(!email || !pass) return;
    try {
      await firebase.auth().signInWithEmailAndPassword(email.trim(), pass);
    } catch(e){
      alert("Sign-in failed: " + (e && e.message ? e.message : e));
      console.error(e);
    }
  });
  $("signOutBtn").addEventListener("click", async () => {
    try { await firebase.auth().signOut(); } catch(e){}
    try { localStorage.removeItem("planner.forceMember"); } catch(e){}
    location.reload();
  });

  document.addEventListener("click", (e) => {
    if(!e.target.closest(".projDropWrap")){
      document.querySelectorAll(".projDropList.show").forEach(el => el.classList.remove("show"));
      document.querySelectorAll(".projDropBtn.open").forEach(el => el.classList.remove("open"));
    }
  });

  function startWatch(){
    if(!db){
      console.warn("Admin: Firebase not loaded; member list will be empty.");
      renderMembers();
      return;
    }
    const membersRef = membersCollection();
    console.log("[ADMIN] firebase loaded?", !!window.firebase);
    try { console.log("[ADMIN] projectId:", firebase?.apps?.[0]?.options?.projectId); } catch(e){}
    console.log("[ADMIN] db exists?", !!db);
    console.log("[ADMIN] membersRef?", membersRef ? "YES" : "NO");
    try { console.log("[ADMIN] membersRef.path:", membersRef?.path); } catch(e){}
    if(!membersRef){
      MEMBERS = [];
      renderMembers();
      return;
    }
    membersRef.onSnapshot(snap => {
      console.log("[ADMIN] teamMembers snapshot size:", snap.size, snap.docs.map(d => d.id));
      MEMBERS = snap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .sort((a, b) => {
          const aActive = a.active !== false ? 1 : 0;
          const bActive = b.active !== false ? 1 : 0;
          if(aActive !== bActive) return bActive - aActive;
          const an = String(a.name || "").toLowerCase();
          const bn = String(b.name || "").toLowerCase();
          return an.localeCompare(bn);
        });
      renderMembers();
    }, err => {
      console.log("[ADMIN] snapshot ERROR:", err?.code, err?.message, err);
      console.error("Admin members listener error:", err);
      MEMBERS = [];
      renderMembers();
    });
  }

  setNavDate();
  setRevPill();
  const host = String(location.hostname || "").toLowerCase();
  const authBypassHosts = new Set([
    "localhost",
    "127.0.0.1",
    "::1",
    "vmb-team-planner.vercel.app"
  ]);
  const isAuthBypassHost = authBypassHosts.has(host);
  if(isAuthBypassHost){
    // Bypass auth gate on approved hosts.
    try { $("signInBtn").style.display = "none"; } catch(e){}
    try { $("signOutBtn").style.display = "none"; } catch(e){}
    startWatch();
    return;
  }
  if(auth && typeof auth.onAuthStateChanged === "function"){
    auth.onAuthStateChanged((u) => {
      console.log("[ADMIN] auth user:", u ? { uid: u.uid, email: u.email } : null);
      if(u) startWatch();
      else {
        MEMBERS = [];
        renderMembers();
        console.warn("[ADMIN] Not signed in. You must sign in for teamMembers to load.");
      }
    });
  } else {
    console.warn("[ADMIN] auth unavailable; startWatch disabled until auth is available.");
    // startWatch(); // now invoked after auth state is ready
  }
})();
</script>
</body>
</html>
